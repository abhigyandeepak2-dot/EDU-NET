<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud & Notifications</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
display:flex;
background:#f3f6fb;
color:#111827;
}

/* SIDEBAR */
.sidebar{
width:230px;
height:100vh;
background:#111827;
color:white;
padding:25px 20px;
position:fixed;
}

.logo{
font-weight:600;
font-size:18px;
margin-bottom:40px;
}

.menu div{
padding:10px 12px;
margin:6px 0;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.menu div:hover{
background:#1f2937;
}

/* MAIN */
.main{
margin-left:230px;
width:100%;
display:flex;
flex-direction:column;
}

/* TOPBAR */
.topbar{
height:65px;
background:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
border-bottom:1px solid #e5e7eb;
}

.btn{
padding:8px 14px;
border-radius:8px;
font-size:13px;
cursor:pointer;
border:1px solid #d1d5db;
background:white;
transition:0.2s ease;
}

.btn:hover{
background:#f3f4f6;
}

.btn-primary{
background:#2563eb;
color:white;
border:none;
}

.btn-primary:hover{
background:#1d4ed8;
}

/* CONTENT */
.content{
padding:35px;
max-width:1100px;
}

/* STATS */
.stats{
display:flex;
gap:20px;
margin-bottom:35px;
}

.stat-card{
flex:1;
background:white;
border:1px solid #e5e7eb;
border-radius:14px;
padding:20px;
}

.stat-card h4{
font-size:13px;
color:#6b7280;
margin-bottom:8px;
}

.stat-card span{
font-size:22px;
font-weight:600;
}

/* SECTION */
.section{
margin-bottom:45px;
}

.section-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.section-header h2{
font-size:18px;
font-weight:600;
}

/* CLOUD */
.cloud-box{
background:white;
border:1px solid #e5e7eb;
border-radius:14px;
padding:22px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 0;
border-bottom:1px solid #f1f5f9;
font-size:14px;
}

.row:last-child{
border:none;
}

.status{
background:#dcfce7;
color:#16a34a;
padding:4px 10px;
border-radius:20px;
font-size:12px;
font-weight:500;
}

/* QUICK ACTIONS */
.quick-actions{
display:flex;
gap:15px;
margin-top:20px;
}

.quick-card{
flex:1;
background:white;
border:1px solid #e5e7eb;
border-radius:12px;
padding:15px;
text-align:center;
cursor:pointer;
transition:0.2s;
}

.quick-card:hover{
background:#f9fafb;
}

/* NOTIFICATIONS */
.notification{
background:white;
border:1px solid #e5e7eb;
border-radius:12px;
padding:14px 16px;
margin-bottom:12px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:14px;
transition:0.2s;
}

.notification:hover{
background:#f9fafb;
}

.empty{
color:#9ca3af;
font-size:14px;
padding:10px 0;
}

/* ACTIVITY PANEL */
.activity{
background:white;
border:1px solid #e5e7eb;
border-radius:14px;
padding:20px;
margin-top:25px;
}

.activity-item{
font-size:14px;
margin-bottom:8px;
color:#4b5563;
}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">📚 EduPanel</div>
<div class="menu">
<div>🏠 Dashboard</div>
<div>📤 Upload</div>
<div>📁 Folders</div>
<div>☁ Cloud</div>
<div>🔔 Notifications</div>
</div>
</div>

<div class="main">

<div class="topbar">
<div>☁ Cloud & 🔔 Notifications</div>
<div>
<button class="btn">🔄 Refresh</button>
<button class="btn-primary">⚡ Sync Now</button>
</div>
</div>

<div class="content">

<!-- STATS -->
<div class="stats">
<div class="stat-card">
<h4>Connected Accounts</h4>
<span>2</span>
</div>
<div class="stat-card">
<h4>Total Notifications</h4>
<span id="totalNotify">0</span>
</div>
<div class="stat-card">
<h4>Last Sync</h4>
<span>Today</span>
</div>
</div>

<!-- CLOUD SECTION -->
<div class="section">
<div class="section-header">
<h2>☁ Cloud Storage</h2>
<button class="btn">⚙ Manage Accounts</button>
</div>

<div class="cloud-box">
<div class="row">
<span>📂 Google Drive</span>
<div>
<span class="status">Connected</span>
<button class="btn" style="margin-left:10px;">❌ Disconnect</button>
</div>
</div>

<div class="row">
<span>📁 OneDrive</span>
<div>
<span class="status">Connected</span>
<button class="btn" style="margin-left:10px;">❌ Disconnect</button>
</div>
</div>
</div>

<div class="quick-actions">
<div class="quick-card">🔁 Auto Sync</div>
<div class="quick-card">🛡 Backup Status</div>
<div class="quick-card">📊 Storage Usage</div>
</div>

</div>

<!-- NOTIFICATION SECTION -->
<div class="section">
<div class="section-header">
<h2>🔔 Notifications</h2>
<button class="btn">✔ Mark All as Read</button>
</div>

<div id="notifications"></div>
</div>

<!-- ACTIVITY -->
<div class="activity">
<h3 style="margin-bottom:10px;">📈 Sync Activity</h3>
<div id="activityList"></div>
</div>

</div>
</div>

<script>
let notes = JSON.parse(localStorage.getItem("notes")) || [];
let notificationsDiv = document.getElementById("notifications");

function showNotifications(){
notificationsDiv.innerHTML = "";
document.getElementById("totalNotify").innerText = notes.length;

if(notes.length === 0){
notificationsDiv.innerHTML = "<p class='empty'>No new notifications.</p>";
return;
}

notes.slice().reverse().forEach(note=>{
let fileName = note.file.split("\\\\").pop();
notificationsDiv.innerHTML += `
<div class="notification">
<span>📢 New note in <strong>${note.subject}</strong> — ${fileName}</span>
<button class="btn">👁 View</button>
</div>
`;
});
}

function loadActivity(){
let activity = document.getElementById("activityList");
activity.innerHTML = "";

if(notes.length === 0){
activity.innerHTML = "<p class='empty'>No recent sync activity.</p>";
return;
}

notes.slice(-5).reverse().forEach(note=>{
let fileName = note.file.split("\\\\").pop();
activity.innerHTML += `
<div class="activity-item">☁ Synced ${fileName} to cloud storage</div>
`;
});
}

showNotifications();
loadActivity();
</script>

</body>
</html>
