<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Notes Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f4f6f9;
color:#1f2937;
}

.wrapper{
display:flex;
min-height:100vh;
}

/* SIDEBAR */
.sidebar{
width:240px;
background:#111827;
color:#cbd5e1;
padding:25px 20px;
}

.sidebar h3{
color:white;
margin-bottom:30px;
}

.sidebar div{
padding:10px 12px;
border-radius:6px;
margin-bottom:6px;
cursor:pointer;
}

.sidebar div:hover{
background:#1f2937;
color:white;
}

/* MAIN */
.main{
flex:1;
padding:35px;
}

/* TOPBAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.topbar h2{
font-size:22px;
}

.btn{
padding:8px 14px;
border-radius:6px;
border:1px solid #d1d5db;
background:white;
cursor:pointer;
font-size:13px;
display:flex;
align-items:center;
gap:6px;
}

.btn:hover{
background:#f3f4f6;
}

.btn-primary{
background:#2563eb;
color:white;
border:none;
}

.btn-primary:hover{
background:#1e40af;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
border:1px solid #e5e7eb;
}

.card h3{
font-size:26px;
margin-bottom:5px;
}

/* SECTION */
.section{
background:white;
border-radius:10px;
border:1px solid #e5e7eb;
padding:20px;
margin-bottom:25px;
}

.note{
padding:10px;
border:1px solid #e5e7eb;
border-radius:6px;
margin-bottom:8px;
display:flex;
justify-content:space-between;
align-items:center;
}

.note:hover{
background:#f9fafb;
}

.category{
display:inline-block;
padding:6px 10px;
border-radius:6px;
border:1px solid #d1d5db;
margin:5px 5px 0 0;
font-size:13px;
}

/* UPLOAD FORM */
.form-group{
margin-bottom:15px;
}

select,input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #d1d5db;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="sidebar">
<h3>📘 EduPanel</h3>
<div>🏠 Dashboard</div>
<div>📤 Upload Notes</div>
<div>📁 Smart Folders</div>
<div>☁ Cloud</div>
<div>🔔 Notifications</div>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">

<div class="topbar">
<h2>📚 Teacher Dashboard</h2>
<button class="btn-primary btn" onclick="showUpload()">➕ Upload Notes</button>
</div>

<div class="cards">
<div class="card">
<h3 id="totalNotes">0</h3>
<p>Total Uploaded Notes</p>
</div>
</div>

<div class="section">
<h3>🕒 Recent Uploads</h3>
<div id="recentNotes"></div>
</div>

<div class="section">
<h3>📂 File Categories</h3>
<div id="categories"></div>
</div>

</div>

<!-- UPLOAD SECTION -->
<div id="upload" class="hidden">

<div class="topbar">
<h2>📤 Upload Notes</h2>
<button class="btn" onclick="showDashboard()">⬅ Back</button>
</div>

<div class="section">
<div class="form-group">
<label>Subject</label>
<select id="subject">
<option value="">Select Subject</option>
<option>Computer Science</option>
<option>Mathematics</option>
<option>Physics</option>
</select>
</div>

<div class="form-group">
<label>Choose File</label>
<input type="file" id="file">
</div>

<button class="btn-primary btn" onclick="uploadNote()">⬆ Upload Now</button>
</div>

</div>

</div>
</div>

<script>
let notes = JSON.parse(localStorage.getItem("notes")) || [];

function showUpload(){
document.getElementById("dashboard").classList.add("hidden");
document.getElementById("upload").classList.remove("hidden");
}

function showDashboard(){
document.getElementById("upload").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");
loadDashboard();
}

function uploadNote(){
    let subject = document.getElementById("subject").value;
    let fileInput = document.getElementById("file");

    if(subject === "" || fileInput.files.length === 0){
        alert("Please select subject and file");
        return;
    }

    notes = JSON.parse(localStorage.getItem("notes")) || [];

    notes.push({
        subject: subject,
        file: fileInput.files[0].name
    });

    localStorage.setItem("notes", JSON.stringify(notes));

    fileInput.value = "";
    document.getElementById("subject").value = "";

    loadDashboard();
    showDashboard();
}

function loadDashboard(){

    notes = JSON.parse(localStorage.getItem("notes")) || [];

    // Update total count
    document.getElementById("totalNotes").innerText = notes.length;

    // Recent uploads
    let recent = notes.slice(-3).reverse();
    let recentDiv = document.getElementById("recentNotes");
    recentDiv.innerHTML = "";

    recent.forEach(note=>{
        recentDiv.innerHTML += `
        <div class="note">
            📄 ${note.file}
            <button class="btn">👁 View</button>
        </div>
        `;
    });

    // File categories
    let count = { pdf:0, ppt:0, doc:0, img:0 };

    notes.forEach(n=>{
        let ext = n.file.includes(".") 
            ? n.file.split(".").pop().toLowerCase() 
            : "";

        if(ext === "pdf") count.pdf++;
        else if(ext === "ppt" || ext === "pptx") count.ppt++;
        else if(ext === "doc" || ext === "docx") count.doc++;
        else if(ext) count.img++;
    });

    document.getElementById("categories").innerHTML = `
        <span class="category">📄 PDFs (${count.pdf})</span>
        <span class="category">📊 PPTs (${count.ppt})</span>
        <span class="category">📝 Docs (${count.doc})</span>
        <span class="category">🖼 Images (${count.img})</span>
    `;
}



loadDashboard();
</script>

</body>
</html>
